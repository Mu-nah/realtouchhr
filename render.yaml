services:
  # ── Backend (FastAPI) ─────────────────────────────────────────────────────
  - type: web
    name: realtouchhr-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      # Supabase
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      # Auth
      - key: JWT_SECRET
        generateValue: true
      # App URLs — set APP_URL to your Render frontend URL after first deploy
      - key: APP_URL
        sync: false
      - key: PUBLIC_APP_URL
        sync: false
      # Google OAuth
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # Stripe
      - key: STRIPE_API_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      # AI
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      # Email
      - key: RESEND_API_KEY
        sync: false
      # 2FA / Admin
      - key: TOTP_ISSUER
        value: RealtouchHR
      - key: PLATFORM_ADMINS
        sync: false
      # HMRC / RTI (keep false until ready for live)
      - key: RTI_LIVE_SUBMISSION_ENABLED
        value: "false"
      - key: RTI_AUTO_PREPARE_ENABLED
        value: "false"
      - key: RTI_SYNC_MODE
        value: sandbox

  # ── Frontend (React static site) ─────────────────────────────────────────
  - type: static
    name: realtouchhr-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    plan: free
    envVars:
      # Set this to your backend Render URL, e.g. https://realtouchhr-backend.onrender.com
      - key: REACT_APP_BACKEND_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
